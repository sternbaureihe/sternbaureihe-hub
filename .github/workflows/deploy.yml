name: Deploy SternBaureihe Hub

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sternbaureihe/sternbaureihe-hub

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_HERO_VIDEO_URL=${{ secrets.HERO_VIDEO_URL }}
            NEXT_PUBLIC_REVIVE_URL=${{ secrets.REVIVE_URL }}
            NEXT_PUBLIC_GSC_VERIFICATION=${{ secrets.GSC_VERIFICATION }}

      - name: Deploy to web-server
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          
          docker stop sternbaureihe-hub 2>/dev/null || true
          docker rm sternbaureihe-hub 2>/dev/null || true
          docker pull "$IMAGE"
          
          docker run -d \
            --name sternbaureihe-hub \
            --restart unless-stopped \
            -p 127.0.0.1:4098:3000 \
            -e NODE_ENV=production \
            -e NEXT_PUBLIC_REVIVE_URL="${{ secrets.REVIVE_URL }}" \
            -e NEXT_PUBLIC_GSC_VERIFICATION="${{ secrets.GSC_VERIFICATION }}" \
            "$IMAGE"
          
          echo "Deployed sternbaureihe-hub on port 4098"
          docker ps | grep sternbaureihe-hub
